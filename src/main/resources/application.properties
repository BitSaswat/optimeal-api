spring.application.name=optimeal-api
# ----------------------------------------
# PostgreSQL Database Connection
# ----------------------------------------
spring.datasource.url=jdbc:postgresql://localhost:5432/optimeal
spring.datasource.username=postgres
spring.datasource.password=postgres

# ----------------------------------------
# Hibernate & JPA Configuration
# ----------------------------------------
# We use 'validate' because Flyway handles our actual table creation
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# ----------------------------------------
# Campus Business Rules
# ----------------------------------------
# Total number of enrolled students. Used to calculate the absolute opt-out
# cap per meal (campus.population * dynamicCapPercentage). Update here
# whenever the campus intake changes — no recompile needed.
campus.population=1200

# Base cost of the full daily meal plan in rupees (breakfast + lunch + dinner).
# Rebate amounts per meal are defined in the MealType enum; this value is the
# gross charge before any rebates are applied for a given billing window.
campus.daily-meal-plan-cost=150.0